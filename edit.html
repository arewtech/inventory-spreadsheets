<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Barang - Master Data Inventory</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <div class="min-h-screen">
      <header class="border-b bg-white">
        <div class="mx-auto flex max-w-2xl items-center justify-between px-4 py-4">
          <div>
            <h1 class="text-xl font-semibold">Edit Barang</h1>
            <p class="text-sm text-slate-500">Ubah data master inventory</p>
          </div>
          <a href="index.html" class="rounded-lg border px-3 py-2 text-sm hover:bg-slate-100">Kembali</a>
        </div>
      </header>

      <main class="mx-auto max-w-2xl px-4 py-6">
        <div id="alertBox" class="mb-4 hidden rounded-lg px-4 py-3 text-sm"></div>

        <div class="rounded-xl border bg-white p-5 shadow-sm">
          <form id="editForm" class="grid grid-cols-1 gap-4 sm:grid-cols-2">
            <div>
              <label class="mb-1 block text-sm font-medium">Kode Barang</label>
              <input name="kode_barang" placeholder="Contoh: BRG001" required readonly class="w-full rounded-lg border bg-slate-100 px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">Nama</label>
              <input name="nama" placeholder="Contoh: Laptop Asus" required class="w-full rounded-lg border px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">Kategori</label>
              <select name="kategori" required class="w-full rounded-lg border px-3 py-2 text-sm">
                <option value="" disabled selected>Pilih kategori</option>
                <option value="Elektronik">Elektronik</option>
                <option value="ATK">ATK</option>
                <option value="Furniture">Furniture</option>
                <option value="Lainnya">Lainnya</option>
              </select>
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">Satuan</label>
              <select name="satuan" required class="w-full rounded-lg border px-3 py-2 text-sm">
                <option value="" disabled selected>Pilih satuan</option>
                <option value="Unit">Unit</option>
                <option value="Pcs">Pcs</option>
                <option value="Box">Box</option>
                <option value="Set">Set</option>
              </select>
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">Harga Beli</label>
              <input name="harga_beli" data-currency="true" inputmode="numeric" placeholder="Contoh: 8.000.000" required class="w-full rounded-lg border px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">Harga Jual</label>
              <input name="harga_jual" data-currency="true" inputmode="numeric" placeholder="Contoh: 9.500.000" required class="w-full rounded-lg border px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">Stok</label>
              <input name="stok" type="number" min="0" placeholder="Contoh: 10" required class="w-full rounded-lg border px-3 py-2 text-sm" />
            </div>
            <div>
              <label class="mb-1 block text-sm font-medium">Stok Minimal</label>
              <input name="stok_min" type="number" min="0" placeholder="Contoh: 2" required class="w-full rounded-lg border px-3 py-2 text-sm" />
            </div>

            <div class="col-span-1 mt-2 flex gap-2 sm:col-span-2">
              <button type="submit" class="rounded-lg bg-blue-600 px-4 py-2 text-sm font-medium text-white hover:bg-blue-700">
                Simpan Perubahan
              </button>
              <a href="index.html" class="rounded-lg border px-4 py-2 text-sm hover:bg-slate-100">Batal</a>
            </div>
          </form>
        </div>
      </main>
    </div>

    <div id="globalLoader" class="fixed inset-0 z-[60] hidden items-center justify-center bg-slate-900/40 p-4">
      <div class="rounded-xl bg-white px-5 py-4 text-sm font-medium text-slate-700 shadow-lg">Memproses...</div>
    </div>

    <script type="module" src="assets/js/edit.js"></script>
  </body>
</html>
